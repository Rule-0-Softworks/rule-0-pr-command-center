name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  detect-project:
    runs-on: ubuntu-latest
    outputs:
      present: ${{ steps.detect.outputs.present }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - id: detect
        name: Detect Python project
        run: |
          if [[ -f pyproject.toml && -f uv.lock && -d src ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

  quality:
    needs: detect-project
    if: needs.detect-project.outputs.present == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Set up UV
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
      - name: Install locked dependencies
        run: uv sync --locked --all-groups
      - name: Verify lockfile
        run: uv lock --check
      - name: Run Ruff lint
        run: uv run ruff check .
      - name: Check Ruff formatting
        run: uv run ruff format --check .
      - name: Run Ty
        run: uv run ty check
      - name: Run tests with coverage
        run: uv run --with "pytest-cov>=7,<8" pytest -q --cov --cov-report=xml:coverage.xml
      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request' || (github.event.pull_request.head.repo.fork == false && github.actor != 'dependabot[bot]')
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true
