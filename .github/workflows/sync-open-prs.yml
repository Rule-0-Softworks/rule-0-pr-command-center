name: Test R0S PR access

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: List every open R0S PR
        env:
          GH_TOKEN: ${{ secrets.R0S_PROJECT_TOKEN }}
        run: |
          gh search prs \
            --owner Rule-0-Softworks \
            --state open \
            --archived=false \
            --limit 1000 \
            --json url \
            --jq '.[].url'
